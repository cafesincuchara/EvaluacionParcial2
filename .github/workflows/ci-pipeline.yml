name: CI Pipeline

on:
  push:
    branches: [ "develop", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Make mvnw executable
        run: chmod +x ./mvnw
      - name: Run unit tests
        run: ./mvnw clean test

  sonar:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Make mvnw executable
        run: chmod +x ./mvnw
      - name: SonarCloud analysis
        run: ./mvnw verify sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }} -Dsonar.projectKey=cafesincuchara_evaluacion_parcialn1 -Dsonar.organization=cafesincuchara
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: sonar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker build -t productosapi:${{ github.sha }} .
  # ... (Aquí arriba estará el código de tu compañero para pruebas y seguridad) ...

  deploy:
    name: Despliegue en Entorno Simulado
    # "needs" garantiza la trazabilidad. Solo despliega si la imagen docker se construyó tras pasar test y sonar.
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Levantar la infraestructura con Docker Compose
        run: |
          # Esto lee tu docker-compose.yml, construye la imagen y levanta las 2 réplicas
          docker-compose up -d --build

      - name: 3. Verificar que los contenedores están corriendo
        run: docker ps