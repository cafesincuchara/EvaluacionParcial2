name: CI Pipeline

on:
  push:
    branches: [ "develop", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Make mvnw executable
        run: chmod +x ./mvnw
      - name: Run unit tests
        run: ./mvnw clean test

  sonar:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Make mvnw executable
        run: chmod +x ./mvnw
      - name: SonarCloud analysis
        run: ./mvnw verify sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }} -Dsonar.projectKey=productosapi -Dsonar.organization=cafesincuchara
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: sonar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker build -t productosapi:${{ github.sha }} .
  # ... (Aquí arriba estará el código de tu compañero para pruebas y seguridad) ...

  deploy:
    name: Despliegue en Render
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy en Render
        run: |
          curl -X POST https://api.render.com/v1/services/srv-d8cqb428qa3s73bo5q2g/deploys \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'