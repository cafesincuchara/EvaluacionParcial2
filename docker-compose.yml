version: '3.8'

services:
  microservicio-app:
    # Esto le dice a Compose que construya la imagen usando el Dockerfile de tu compañero
    build: .
    ports:
      - "8080:8080"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: on-failure
